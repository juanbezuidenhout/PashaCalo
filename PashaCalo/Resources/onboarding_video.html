<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>PashaCalo Onboarding</title>
<style>
  /* ============================================================
     PAGE  —  auto-fit canvas to whatever container it lives in
     (1290×2796 marketing recording OR small in-app WebView)
     ============================================================ */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                 "Hiragino Sans", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  .canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 1290px;
    height: 2796px;
    background: #ffffff;
    overflow: hidden;
    transform-origin: top left;
    will-change: transform;
  }

  /* ============================================================
     PHONE WRAPPER  —  slide-in + zoom timeline
     ============================================================ */
  .phone {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1190px;
    height: 2410px;
    margin-left: -595px;
    margin-top: -1205px;
    will-change: transform;
    transform-origin: 50% 50%;
    animation: phone-master 9s cubic-bezier(0.4, 0, 0.2, 1) 0s 1 both;
  }

  .phone::after {
    content: '';
    position: absolute;
    left: 5%;
    right: 5%;
    bottom: -40px;
    height: 120px;
    background: radial-gradient(ellipse at center,
                rgba(0, 0, 0, 0.35) 0%,
                rgba(0, 0, 0, 0.18) 35%,
                rgba(0, 0, 0, 0) 70%);
    filter: blur(20px);
    z-index: -1;
  }

  /* ============================================================
     PHONE FRAME  —  Space Black aluminum
     ============================================================ */
  .phone-frame {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 140px;
    background:
      linear-gradient(135deg,
        #3a3a3c 0%,
        #2a2a2c 20%,
        #1a1a1c 50%,
        #0c0c0e 80%,
        #1d1d1f 100%);
    box-shadow:
      0 80px 140px rgba(0, 0, 0, 0.45),
      0 30px 60px rgba(0, 0, 0, 0.25),
      inset 0 0 0 2px rgba(255, 255, 255, 0.06),
      inset 0 0 60px rgba(0, 0, 0, 0.6);
  }
  .phone-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      linear-gradient(180deg,
        rgba(255, 255, 255, 0.10) 0%,
        rgba(255, 255, 255, 0.02) 18%,
        rgba(255, 255, 255, 0) 35%,
        rgba(255, 255, 255, 0) 65%,
        rgba(255, 255, 255, 0.03) 85%,
        rgba(255, 255, 255, 0.08) 100%);
    pointer-events: none;
  }
  .phone-frame::after {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 132px;
    box-shadow:
      inset 0 0 0 1.5px rgba(255, 255, 255, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.12);
    pointer-events: none;
  }

  /* ============================================================
     SIDE BUTTONS
     ============================================================ */
  .side-button {
    position: absolute;
    background: linear-gradient(90deg, #2a2a2c 0%, #151517 40%, #0a0a0c 100%);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.08),
      inset 0 -1px 0 rgba(0, 0, 0, 0.4),
      0 2px 4px rgba(0, 0, 0, 0.4);
  }
  .btn-action      { left: -6px;  top: 380px; width: 14px; height: 90px;  border-radius: 4px 0 0 4px; }
  .btn-volume-up   { left: -6px;  top: 560px; width: 14px; height: 150px; border-radius: 4px 0 0 4px; }
  .btn-volume-down { left: -6px;  top: 740px; width: 14px; height: 150px; border-radius: 4px 0 0 4px; }
  .btn-power       { right: -6px; top: 560px; width: 14px; height: 240px;
                     border-radius: 0 4px 4px 0;
                     background: linear-gradient(270deg, #2a2a2c 0%, #151517 40%, #0a0a0c 100%); }

  /* ============================================================
     SCREEN AREA
     ============================================================ */
  .screen-container {
    position: absolute;
    left: 36px; top: 36px; right: 36px; bottom: 36px;
    border-radius: 110px;
    background: #000;
    overflow: hidden;
    box-shadow:
      inset 0 0 0 2px rgba(0, 0, 0, 1),
      inset 0 0 0 4px rgba(40, 40, 42, 0.6);
  }
  .screen-clip {
    position: absolute;
    inset: 0;
    border-radius: 110px;
    overflow: hidden;
    background: #000;
  }

  .screen-slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    will-change: transform;
    transform: translate3d(0, 0, 0);
  }
  .screen-slide img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
    z-index: 2;
  }
  /* When the <img> 404s we hide it via onerror in markup,
     so the CSS placeholder underneath becomes visible. */

  .screen-1 { animation: screen-1-slide 9s cubic-bezier(0.4, 0, 0.2, 1) 0s 1 both; }
  .screen-2 { animation: screen-2-slide 9s cubic-bezier(0.4, 0, 0.2, 1) 0s 1 both; }
  .screen-3 { animation: screen-3-slide 9s cubic-bezier(0.4, 0, 0.2, 1) 0s 1 both; }

  /* ============================================================
     CSS-ONLY PLACEHOLDER SCREENS  (visible when PNGs aren't bundled)
     ============================================================ */
  .placeholder {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: hidden;
  }

  /* --- Screen 1: Camera UI w/ bento box ---------------------- */
  .placeholder-camera {
    background: #050505;
    color: #fff;
  }
  .placeholder-camera::before {
    /* faint vignette + subtle "viewfinder" gradient */
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(255,255,255,0.05), transparent 60%),
      linear-gradient(180deg, #0a0a0a 0%, #050505 50%, #000 100%);
  }
  .camera-top {
    position: absolute;
    top: 160px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 80px;
    color: #fff;
    font-size: 36px;
    font-weight: 500;
    opacity: 0.9;
  }
  .camera-bento {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 880px;
    height: 880px;
    border-radius: 60px;
    border: 4px solid rgba(255,255,255,0.85);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 30px 60px rgba(0,0,0,0.5);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    padding: 30px;
    gap: 24px;
    box-sizing: border-box;
  }
  .bento-cell {
    border-radius: 36px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border: 2px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(20px);
  }
  .bento-cell.r { background: linear-gradient(135deg, rgba(255,107,157,0.35), rgba(255,107,157,0.12)); border-color: rgba(255,107,157,0.5); }
  .bento-cell.o { background: linear-gradient(135deg, rgba(255,149,0,0.32),   rgba(255,149,0,0.10));   border-color: rgba(255,149,0,0.5); }
  .bento-cell.b { background: linear-gradient(135deg, rgba(0,122,255,0.32),   rgba(0,122,255,0.10));   border-color: rgba(0,122,255,0.5); }
  .bento-cell.g { background: linear-gradient(135deg, rgba(52,199,89,0.32),   rgba(52,199,89,0.10));   border-color: rgba(52,199,89,0.5); }

  .camera-caption {
    position: absolute;
    left: 0; right: 0;
    bottom: 540px;
    text-align: center;
    font-size: 38px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
    opacity: 0.9;
  }
  .camera-shutter {
    position: absolute;
    left: 50%;
    bottom: 240px;
    margin-left: -100px;
    width: 200px;
    height: 200px;
    border-radius: 100px;
    background: #fff;
    box-shadow: 0 0 0 8px rgba(0,0,0,1), 0 0 0 14px rgba(255,255,255,1);
  }

  /* --- Screen 2: Loading dashboard --------------------------- */
  .placeholder-loading {
    background: linear-gradient(180deg, #F8F7F2 0%, #F1EFE9 100%);
    color: #1a1a1a;
  }
  .loading-brand {
    position: absolute;
    top: 220px;
    left: 0; right: 0;
    text-align: center;
    font-size: 60px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .loading-status {
    position: absolute;
    top: 1500px;
    left: 0; right: 0;
    text-align: center;
    font-size: 48px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .loading-sub {
    position: absolute;
    top: 1600px;
    left: 0; right: 0;
    text-align: center;
    font-size: 32px;
    color: #888;
  }
  .loading-card {
    position: absolute;
    top: 460px;
    left: 120px; right: 120px;
    height: 900px;
    border-radius: 60px;
    background: #ffffff;
    box-shadow: 0 30px 80px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .loading-card::before {
    content: '';
    position: absolute;
    left: 60px; right: 60px;
    top: 80px;
    height: 40px;
    border-radius: 8px;
    background: linear-gradient(90deg, #ececec 0%, #f8f8f8 50%, #ececec 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
  }
  .loading-card::after {
    content: '';
    position: absolute;
    left: 60px;
    top: 160px;
    width: 320px;
    height: 96px;
    border-radius: 12px;
    background: linear-gradient(90deg, #ececec 0%, #f8f8f8 50%, #ececec 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
  }

  /* --- Screen 3: Result screen w/ nutrition ------------------ */
  .placeholder-result {
    background: linear-gradient(180deg, #FFFFFF 0%, #F8F7F2 100%);
    color: #1a1a1a;
  }
  .result-header {
    position: absolute;
    top: 230px;
    left: 0; right: 0;
    text-align: center;
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .result-hero {
    position: absolute;
    top: 380px;
    left: 50%;
    margin-left: -300px;
    width: 600px;
    height: 600px;
    border-radius: 80px;
    background:
      radial-gradient(circle at 30% 30%, #ffd28a 0%, #ff9a3c 60%, #c9701b 100%);
    box-shadow: 0 40px 80px rgba(201, 112, 27, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 240px;
  }
  .result-hero::after {
    content: '🍱';
  }
  .result-name {
    position: absolute;
    top: 1060px;
    left: 0; right: 0;
    text-align: center;
    font-size: 56px;
    font-weight: 700;
  }
  .result-kcal {
    position: absolute;
    top: 1170px;
    left: 0; right: 0;
    text-align: center;
    font-size: 40px;
    color: #FF6B9D;
    font-weight: 600;
  }
  .result-grid {
    position: absolute;
    top: 1320px;
    left: 100px;
    right: 100px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
  }
  .result-kpi {
    background: #fff;
    border-radius: 36px;
    padding: 40px 36px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.06);
  }
  .result-kpi .lbl { color: #888; font-size: 28px; }
  .result-kpi .val { color: #111; font-size: 56px; font-weight: 700; margin-top: 8px; }
  .result-kpi .unit { color: #888; font-size: 28px; font-weight: 500; margin-left: 4px; }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ============================================================
     LOADING OVERLAYS  —  spinner + progress (only during screen 2)
     ============================================================ */
  .spinner-overlay {
    position: absolute;
    left: 50%;
    top: 1300px;
    width: 160px;
    height: 160px;
    margin-left: -80px;
    border-radius: 50%;
    pointer-events: none;
    animation: spinner-rotate 1.1s linear infinite;
    z-index: 3;
  }
  .spinner-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
       from 0deg,
       rgba(255, 107, 157, 0)   0%,
       rgba(255, 107, 157, 0.4) 60%,
       rgba(255, 107, 157, 1)   100%);
    -webkit-mask: radial-gradient(circle, transparent 60px, #000 62px, #000 78px, transparent 80px);
            mask: radial-gradient(circle, transparent 60px, #000 62px, #000 78px, transparent 80px);
    opacity: 0;
    animation: spinner-fade 9s linear 0s 1 both;
  }

  .progress-bar {
    position: absolute;
    left: 22%; right: 22%;
    top: 1750px;
    height: 14px;
    background: rgba(0, 0, 0, 0.06);
    border-radius: 7px;
    overflow: hidden;
    opacity: 0;
    animation: progress-fade 9s linear 0s 1 both;
    pointer-events: none;
    z-index: 3;
  }
  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 20%;
    background: linear-gradient(90deg, #FF6B9D, #FF95C5);
    border-radius: 7px;
    animation: progress-grow 9s cubic-bezier(0.4, 0, 0.2, 1) 0s 1 both;
  }

  /* ============================================================
     DYNAMIC ISLAND
     ============================================================ */
  .dynamic-island {
    position: absolute;
    left: 50%;
    top: 38px;
    width: 280px;
    height: 86px;
    margin-left: -140px;
    background: #000;
    border-radius: 43px;
    z-index: 30;
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, 0.03),
      0 2px 6px rgba(0, 0, 0, 0.4);
  }

  /* ============================================================
     STATUS BAR  (9:41 / signal / wifi / battery, white)
     ============================================================ */
  .status-bar {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 130px;
    z-index: 25;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 90px;
    box-sizing: border-box;
    pointer-events: none;
    color: #fff;
  }
  .status-time {
    font-size: 46px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-top: 22px;
    font-feature-settings: "tnum";
    text-shadow: 0 1px 2px rgba(0,0,0,0.25);
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 22px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
  }
  .status-icons svg { display: block; }

  /* Dark status bar variant — when on a light placeholder screen */
  .screen-slide.theme-light ~ .status-bar,
  .status-bar.theme-light {
    /* applied via JS-less data attribute trick — see body class */
  }

  /* ============================================================
     FADE TO WHITE
     ============================================================ */
  .fade-overlay {
    position: absolute;
    inset: 0;
    background: #ffffff;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    animation: fade-to-white 9s linear 0s 1 both;
  }

  /* ============================================================
     KEYFRAMES
     ============================================================ */
  @keyframes phone-master {
    0%      { transform: translate3d(140%, 0, 0) scale(0.92); }
    5.555%  { transform: translate3d(0, 0, 0)    scale(1.00); }
    27.777% { transform: translate3d(0, 0, 0)    scale(1.04); }
    61.111% { transform: translate3d(0, 0, 0)    scale(1.04); }
    94.444% { transform: translate3d(0, 0, 0)    scale(1.08); }
    100%    { transform: translate3d(0, 0, 0)    scale(1.08); }
  }
  @keyframes screen-1-slide {
    0%      { transform: translate3d(0, 0, 0); }
    27.777% { transform: translate3d(0, 0, 0); }
    33.333% { transform: translate3d(-100%, 0, 0); }
    100%    { transform: translate3d(-100%, 0, 0); }
  }
  @keyframes screen-2-slide {
    0%      { transform: translate3d(100%, 0, 0); }
    27.777% { transform: translate3d(100%, 0, 0); }
    33.333% { transform: translate3d(0, 0, 0); }
    55.555% { transform: translate3d(0, 0, 0); }
    61.111% { transform: translate3d(-100%, 0, 0); }
    100%    { transform: translate3d(-100%, 0, 0); }
  }
  @keyframes screen-3-slide {
    0%      { transform: translate3d(100%, 0, 0); }
    55.555% { transform: translate3d(100%, 0, 0); }
    61.111% { transform: translate3d(0, 0, 0); }
    100%    { transform: translate3d(0, 0, 0); }
  }
  @keyframes spinner-rotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes spinner-fade {
    0%, 33.333% { opacity: 0; }
    36%         { opacity: 1; }
    53%         { opacity: 1; }
    55.555%     { opacity: 0; }
    100%        { opacity: 0; }
  }
  @keyframes progress-fade {
    0%, 33.333% { opacity: 0; }
    36%         { opacity: 1; }
    53%         { opacity: 1; }
    55.555%     { opacity: 0; }
    100%        { opacity: 0; }
  }
  @keyframes progress-grow {
    0%, 33.333% { width: 20%; }
    55.555%     { width: 90%; }
    100%        { width: 90%; }
  }
  @keyframes fade-to-white {
    0%, 94.444% { opacity: 0; }
    100%        { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="canvas" id="canvas">
    <div class="phone">
      <div class="phone-frame">

        <div class="side-button btn-action"></div>
        <div class="side-button btn-volume-up"></div>
        <div class="side-button btn-volume-down"></div>
        <div class="side-button btn-power"></div>

        <div class="screen-container">
          <div class="screen-clip">

            <!-- Screen 1: Camera (bento box) -->
            <div class="screen-slide screen-1">
              <div class="placeholder placeholder-camera">
                <div class="camera-top"><span>キャンセル</span><span>⚡︎</span></div>
                <div class="camera-bento">
                  <div class="bento-cell r"></div>
                  <div class="bento-cell o"></div>
                  <div class="bento-cell b"></div>
                  <div class="bento-cell g"></div>
                </div>
                <div class="camera-caption">食事を撮影してください</div>
                <div class="camera-shutter"></div>
              </div>
              <img src="./screen2_camera.png" alt="" onerror="this.style.display='none'" />
            </div>

            <!-- Screen 2: Loading -->
            <div class="screen-slide screen-2">
              <div class="placeholder placeholder-loading">
                <div class="loading-brand">パシャカロ</div>
                <div class="loading-card"></div>
                <div class="loading-status">AI分析中…</div>
                <div class="loading-sub">栄養成分を計算しています</div>
              </div>
              <img src="./screen3_loading.png" alt="" onerror="this.style.display='none'" />
              <div class="spinner-overlay"></div>
              <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>

            <!-- Screen 3: Result -->
            <div class="screen-slide screen-3">
              <div class="placeholder placeholder-result">
                <div class="result-header">栄養情報</div>
                <div class="result-hero"></div>
                <div class="result-name">鮭弁当</div>
                <div class="result-kcal">650 kcal</div>
                <div class="result-grid">
                  <div class="result-kpi"><div class="lbl">タンパク質</div><div class="val">28<span class="unit">g</span></div></div>
                  <div class="result-kpi"><div class="lbl">脂質</div><div class="val">15<span class="unit">g</span></div></div>
                  <div class="result-kpi"><div class="lbl">炭水化物</div><div class="val">85<span class="unit">g</span></div></div>
                  <div class="result-kpi"><div class="lbl">食物繊維</div><div class="val">4<span class="unit">g</span></div></div>
                </div>
              </div>
              <img src="./screen4_result.png" alt="" onerror="this.style.display='none'" />
            </div>

            <!-- Status bar (rendered above screens, beside Dynamic Island) -->
            <div class="status-bar">
              <span class="status-time">9:41</span>
              <div class="status-icons">
                <svg width="58" height="36" viewBox="0 0 80 50">
                  <rect x="0"  y="35" width="14" height="15" rx="3" fill="white"/>
                  <rect x="22" y="25" width="14" height="25" rx="3" fill="white"/>
                  <rect x="44" y="13" width="14" height="37" rx="3" fill="white"/>
                  <rect x="66" y="0"  width="14" height="50" rx="3" fill="white"/>
                </svg>
                <svg width="48" height="36" viewBox="0 0 60 50">
                  <path d="M30 6 C12 6 4 22 4 28 L13 28 C13 22 19 14 30 14 C41 14 47 22 47 28 L56 28 C56 22 48 6 30 6 Z" fill="white"/>
                  <path d="M30 20 C20 20 14 28 14 32 L22 32 C22 30 25 26 30 26 C35 26 38 30 38 32 L46 32 C46 28 40 20 30 20 Z" fill="white"/>
                  <circle cx="30" cy="40" r="5" fill="white"/>
                </svg>
                <svg width="76" height="36" viewBox="0 0 100 50">
                  <rect x="1" y="5" width="86" height="40" rx="10" ry="10"
                        fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
                  <rect x="6" y="10" width="76" height="30" rx="6" ry="6" fill="white"/>
                  <rect x="89" y="17" width="6" height="16" rx="2" fill="white" opacity="0.5"/>
                </svg>
              </div>
            </div>

            <div class="dynamic-island"></div>

          </div>
        </div>

      </div>
    </div>

    <div class="fade-overlay"></div>
  </div>

  <script>
    // Auto-fit the 1290×2796 canvas into whatever viewport hosts us
    // (so the same file works for marketing recording AND in-app WebView).
    (function () {
      var CANVAS_W = 1290;
      var CANVAS_H = 2796;
      var canvas = document.getElementById('canvas');

      function fit() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var scale = Math.min(vw / CANVAS_W, vh / CANVAS_H);
        var w = CANVAS_W * scale;
        var h = CANVAS_H * scale;
        canvas.style.transform = 'scale(' + scale + ')';
        canvas.style.left = ((vw - w) / 2) + 'px';
        canvas.style.top  = ((vh - h) / 2) + 'px';
      }

      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
      fit();
    })();

    // Frame-capture sync
    window._startTime = Date.now();
  </script>
</body>
</html>
